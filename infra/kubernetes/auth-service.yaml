# auth-service.yaml — Full production-grade deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: production
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2   # 2 replicas for HA
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      # Spread pods across AZs — if AZ-a fails, AZ-b pod keeps running
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: auth-service
      containers:
      - name: auth-service
        # Replace 697064446528 with your actual AWS account ID
        image: 697064446528.dkr.ecr.us-east-1.amazonaws.com/cloud-native-cluster/auth-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/auth_db
        - name: SECRET_KEY
          value: prod-secret-key-use-secrets-manager-in-real-prod
        - name: JAEGER_ENDPOINT
          value: http://jaeger:4317
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: production
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP

---
# HPA: automatically add pods when CPU > 70%
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# PDB: during node drain/upgrade, always keep at least 1 pod running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
