name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, product-service, order-service, notification-service]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        pip install -r requirements.txt

    - name: Check service starts correctly
      run: |
        cd services/${{ matrix.service }}
        python -c "import main; print('✅ ${{ matrix.service }} imports successfully')"
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        SECRET_KEY: test-secret-key
        JAEGER_ENDPOINT: http://localhost:4317
        AUTH_SERVICE_URL: http://localhost:8001
        PRODUCT_SERVICE_URL: http://localhost:8002
        NOTIFICATION_SERVICE_URL: http://localhost:8004

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: CRITICAL,HIGH
        exit-code: '0'
        format: table

    - name: Scan for secrets with TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified
      continue-on-error: true

  build:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    strategy:
      matrix:
        service: [auth-service, product-service, order-service, notification-service]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          -t $ECR_REGISTRY/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:$IMAGE_TAG \
          -t $ECR_REGISTRY/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:latest \
          services/${{ matrix.service }}/
        docker push $ECR_REGISTRY/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:latest
        echo "image=$ECR_REGISTRY/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: image
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.EKS_CLUSTER_NAME }}/${{ matrix.service }}:${{ github.sha }}
        severity: CRITICAL
        exit-code: '0'
        format: table