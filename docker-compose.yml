version: '3.8'

services:

  # ── PostgreSQL — One instance, multiple databases ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # ── Jaeger — Distributed Tracing ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    networks:
      - microservices-network

  # ── Auth Service ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      SECRET_KEY: local-dev-secret-key-change-in-production
      JAEGER_ENDPOINT: http://jaeger:4317
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - microservices-network
    restart: unless-stopped

  # ── Product Service ─────────────────────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/product_db
      AUTH_SERVICE_URL: http://auth-service:8001
      JAEGER_ENDPOINT: http://jaeger:4317
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - microservices-network
    restart: unless-stopped

  # ── Order Service ───────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      AUTH_SERVICE_URL: http://auth-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      JAEGER_ENDPOINT: http://jaeger:4317
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - microservices-network
    restart: unless-stopped

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      JAEGER_ENDPOINT: http://jaeger:4317
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  microservices-network:
    driver: bridge